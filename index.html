<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .leaderboard-container { max-width: 1450px; margin: 0 auto; background-color: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
		.header { background: linear-gradient(135deg, #124d12 0%, #228B22 50%, #1a5e1a 100%); color: white; padding: 25px 80px; text-align: center; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; border-bottom: 4px solid #FFD700; position: relative; display: flex; align-items: center; justify-content: center; }
		.header img { position: absolute; top: 50%; transform: translateY(-50%); height: 50px; }
		.logo-left { left: 40px; } .logo-right { right: 50px; }
        .info-bar { display: flex; justify-content: space-around; background: #333; color: #ddd; padding: 12px; font-size: 14px; text-transform: uppercase; }
        .info-item span { color: white; margin-left: 8px; font-weight: bold; }
        .venue { background: #444; color: #FFFFF7; padding: 12px; text-align: center; font-size: 18px; font-weight: bold; }
        .venue.major { background: linear-gradient(90deg, #8B6914 0%, #FFD700 50%, #8B6914 100%) !important; color: #000 !important; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #e6e6e6; padding: 12px; text-align: left; font-size: 13px; border-bottom: 2px solid #ddd; text-transform: uppercase; }
        td { padding: 10px 12px; border-bottom: 1px solid #ddd; font-size: 15px; }
        
        .pos { font-weight: bold; width: 50px; text-align: center; }
        .to-par { font-weight: bold; text-align: center; width: 60px; font-size: 17px; }
        .under { color: #8B0000; } .even { color: #1AA260; }
        .round-score, .total, .prize, .stat-col { text-align: center; width: 65px; }
        .prize { font-weight: bold; color: #000; width: 100px; }
        .stat-col { background-color: #fcfcfc; color: #666; font-size: 13px; border-left: 1px solid #eee; }
        
        .section-title { background: #228B22; color: white; padding: 15px; font-size: 20px; font-weight: bold; margin-top: 30px; border-left: 10px solid #FFD700; }
        .hof-container { margin-top: 40px; padding: 30px; background: #1a1a1a; border-radius: 12px; color: white; }
        .hof-header { text-align: center; font-size: 28px; color: #FFD700; margin-bottom: 25px; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        .hof-cards { display: flex; justify-content: space-around; gap: 20px; flex-wrap: wrap; }
        .hof-card { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 8px; padding: 20px; width: 260px; text-align: center; }
        .hof-stat span { color: #FFD700; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="header">	
        <img src="2k25 logo.png" class="logo-left">
        <span id="header-text">Emerald Tour</span>
        <img src="FedEx-Cup-logo.png" class="logo-right">
    </div>

    <div class="info-bar">
        <div class="info-item">Date: <span id="date-field">-</span></div>
        <div class="info-item">Course Par: <span id="course-par">-</span></div>
        <div class="info-item">Prize Pool: <span id="prize-pool">-</span></div>
    </div>

    <div id="venue-display" class="venue">Loading Tournament Data...</div>

    <table>
        <thead>
            <tr>
                <th class="pos">POS</th>
                <th>PLAYER</th>
                <th class="to-par">TO PAR</th>
                <th class="round-score">R1</th>
                <th class="round-score">R2</th>
                <th class="round-score" id="th-r3">R3</th>
                <th class="round-score" id="th-r4">R4</th>
                <th class="total">TOTAL</th>
                <th class="prize">PRIZE</th>
                <th class="stat-col">FiR%</th>
                <th class="stat-col">GiR%</th>
                <th class="stat-col">SCRAM</th>
                <th class="stat-col">NTP</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>

    <div class="section-title">Season Standings</div>
    <table>
        <thead>
            <tr>
                <th style="padding-left:15px">PLAYER</th>
                <th class="total">POINTS</th>
                <th class="total">EARNINGS</th>
                <th class="total">EVENTS</th>
            </tr>
        </thead>
        <tbody id="standings-body"></tbody>
    </table>

    <div class="hof-container">
        <div class="hof-header">🏆 Emerald Tour Hall of Fame 🏆</div>
        <div class="hof-cards" id="hof-display"></div>
    </div>
</div>

<script>
    // 1. UPDATE THIS URL to point to your data.json on GitHub
    const DATA_URL = 'data.json'; 

    async function loadTourData() {
        try {
            const response = await fetch(DATA_URL);
            const tourData = await response.json();
            renderAll(tourData);
        } catch (err) {
            console.error("Error loading tour data:", err);
            document.getElementById('venue-display').textContent = "Error loading data. Check data.json path.";
        }
    }

    function renderAll(tourData) {
        // Headers
        document.getElementById('header-text').textContent = tourData.header || "Emerald Tour";
        document.getElementById('date-field').textContent = tourData.date || "-";
        document.getElementById('course-par').textContent = tourData.coursePar || "-";
        document.getElementById('prize-pool').textContent = '$' + (tourData.prizePool || 0).toLocaleString();
        
        const venueEl = document.getElementById('venue-display');
        venueEl.textContent = tourData.venue;
        if(tourData.venue?.toLowerCase().includes('major')) venueEl.classList.add('major');

        if(!tourData.showR3R4) {
            document.getElementById('th-r3').classList.add('hidden');
            document.getElementById('th-r4').classList.add('hidden');
        }

        // 1. Leaderboard
        const lbBody = document.getElementById('leaderboard-body');
        const sortedLB = [...tourData.players].sort((a,b) => calculateRawTotal(a, tourData) - calculateRawTotal(b, tourData));
        
        sortedLB.forEach((p, idx) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="pos">${idx + 1}</td>
                <td>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="fa-brands ${p.console || 'fa-gamepad'}"></i>
                        <span class="fi fi-${(p.country || 'un').toLowerCase()}"></span>
                        <strong>${p.name}</strong>
                    </div>
                </td>
                <td class="to-par ${getToParClass(p, tourData)}">${calculateToPar(p, tourData)}</td>
                <td class="round-score">${p.r1 || '-'}</td>
                <td class="round-score">${p.r2 || '-'}</td>
                <td class="round-score ${tourData.showR3R4 ? '' : 'hidden'}">${p.r3 || '-'}</td>
                <td class="round-score ${tourData.showR3R4 ? '' : 'hidden'}">${p.r4 || '-'}</td>
                <td class="total"><strong>${calculateRawTotal(p, tourData) || '-'}</strong></td>
                <td class="prize">${p.prize || '$0'}</td>
                <td class="stat-col">${p.fir || '-'}</td>
                <td class="stat-col">${p.gir || '-'}</td>
                <td class="stat-col">${p.scrambling || '-'}</td>
                <td class="stat-col">${p.ntp || '-'}</td>
            `;
            lbBody.appendChild(tr);
        });

        // 2. Standings
        const stBody = document.getElementById('standings-body');
        const players = Object.keys(tourData.seasonPoints || {});
        players.sort((a,b) => (tourData.seasonPoints[b] || 0) - (tourData.seasonPoints[a] || 0));

        players.forEach(name => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="padding-left:15px"><strong>${name}</strong></td>
                <td class="total">${(tourData.seasonPoints[name] || 0).toLocaleString()}</td>
                <td class="total" style="font-weight:bold">$${(tourData.seasonEarnings[name] || 0).toLocaleString()}</td>
                <td class="total">${tourData.seasonEvents[name] || 0}</td>
            `;
            stBody.appendChild(tr);
        });

        // 3. Hall of Fame
        const hofDisplay = document.getElementById('hof-display');
        const sortedHOF = Object.entries(tourData.seasonEarnings || {})
            .sort(([,a],[,b]) => b-a).slice(0,3);
        
        const medals = ['🥇', '🥈', '🥉'];
        sortedHOF.forEach(([name, cash], i) => {
            const wins = tourData.eventHistory?.filter(e => e.winner === name).length || 0;
            const card = document.createElement('div');
            card.className = 'hof-card';
            card.innerHTML = `
                <div style="font-size:40px;">${medals[i]}</div>
                <div style="font-size:20px; font-weight:bold; margin:10px 0;">${name}</div>
                <div class="hof-stat">Earnings: <span>$${cash.toLocaleString()}</span></div>
                <div class="hof-stat">Wins: <span>${wins}</span></div>
            `;
            hofDisplay.appendChild(card);
        });
    }

    // Helper functions
    function calculateRawTotal(p) {
        let scores = [p.r1, p.r2, p.r3, p.r4].filter(s => s && s > 0);
        return scores.length > 0 ? scores.reduce((a, b) => parseInt(a) + parseInt(b), 0) : 999;
    }

    function calculateToPar(p, data) {
        let scores = [p.r1, p.r2, p.r3, p.r4].filter(s => s && s > 0);
        if (scores.length === 0) return '-';
        let total = scores.reduce((a, b) => parseInt(a) + parseInt(b), 0);
        let rel = total - (parseInt(data.coursePar) * scores.length);
        return rel === 0 ? 'E' : (rel > 0 ? `+${rel}` : rel);
    }

    function getToParClass(p, data) {
        let scores = [p.r1, p.r2, p.r3, p.r4].filter(s => s && s > 0);
        if (scores.length === 0) return '';
        let total = scores.reduce((a, b) => parseInt(a) + parseInt(b), 0);
        let rel = total - (parseInt(data.coursePar) * scores.length);
        return rel < 0 ? 'under' : (rel === 0 ? 'even' : '');
    }

    window.onload = loadTourData;
</script>
</body>
</html>
