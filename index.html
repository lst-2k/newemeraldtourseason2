<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Standings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --emerald: #228B22; 
            --dark-emerald: #124d12; 
            --ps-blue: #003791;
            --xbox-green: #107C10;
            --steam-blue: #171a21;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 10px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Full Width Logo Header */
        .header { background: #000; line-height: 0; }
        .header img { width: 100%; height: auto; display: block; }
        
        /* Venue Information Bar */
        .venue-bar { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: space-around; 
            background: linear-gradient(135deg, var(--dark-emerald), var(--emerald)); 
            color: white; 
            padding: 12px 10px; 
            font-weight: bold; 
            font-size: 0.9em; 
            gap: 10px;
            border-bottom: 3px solid #0e3a0e;
        }

        .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        h2 { background: #eee; margin: 0; padding: 15px; border-bottom: 2px solid var(--emerald); color: #333; font-size: 1.2em; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; } 
        th { background: #f8f8f8; color: #666; font-size: 0.75em; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9em; }
        
        .center { text-align: center !important; }

        .pos { font-weight: bold; width: 40px; text-align: center; }
        .player-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        
        /* Console Icon Colors */
        .fa-playstation { color: var(--ps-blue); }
        .fa-xbox { color: var(--xbox-green); }
        .fa-steam { color: var(--steam-blue); }
        .fa-gamepad { color: #555; }

        .to-par { font-weight: bold; width: 60px; }
        .under { color: #d9534f; }
        .total { font-weight: bold; background: #f9f9f9; width: 60px; }
        
        .col-earnings { min-width: 110px; white-space: nowrap; color: var(--emerald); font-weight: bold; }
        .prize { color: var(--emerald); font-weight: bold; text-align: right; white-space: nowrap; padding-right: 20px; }

        .bonus-stat { color: #666; font-size: 0.85em; width: 60px; }

        tr:nth-child(even) { background-color: #fafafa; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="Emerald Tour Logo">
    </div>

    <div class="venue-bar">
        <span id="display-venue">---</span>
        <span id="display-date">---</span>
        <span>PAR: <span id="display-par">--</span></span>
        <span>PURSE: <span id="display-purse">--</span></span>
    </div>

    <h2>Current Event Leaderboard</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th class="center">Pos</th>
                    <th>Player</th>
                    <th class="center">To Par</th>
                    <th class="center">R1</th>
                    <th class="center">R2</th>
                    <th class="r34 hidden center">R3</th>
                    <th class="r34 hidden center">R4</th>
                    <th class="center">Total</th>
                    <th style="text-align:right">Prize</th>
                    <th class="center">FiR</th>
                    <th class="center">GiR</th>
                    <th class="center">Scram</th>
                    <th class="center">NTP</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <h2>Season Standings & Stats</h2>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th class="center">Season Pts</th>
                    <th class="center">Earnings</th>
                    <th class="center">Events</th>
                    <th class="center">FiR %</th>
                    <th class="center">GiR %</th>
                    <th class="center">Scram</th>
                    <th class="center">NTP</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>
</div>

<script>
    const DATA_FILE = 'emerald_tour_full_backup.json';

    async function loadResults() {
        try {
            const response = await fetch(DATA_FILE);
            if (!response.ok) throw new Error("JSON not found");
            const data = await response.json();

            document.getElementById('display-venue').textContent = data.venue || "---";
            document.getElementById('display-date').textContent = data.date || "---";
            document.getElementById('display-par').textContent = data.coursePar || "--";
            document.getElementById('display-purse').textContent = data.prizePool || "--";

            const lbBody = document.getElementById('leaderboard-body');
            const stBody = document.getElementById('standings-body');

            const hasR3 = data.players.some(p => p.r3 && p.r3 > 0);
            if(hasR3) document.querySelectorAll('.r34').forEach(el => el.classList.remove('hidden'));

            // Leaderboard rendering
            data.players.forEach((p, index) => {
                const par = parseInt(data.coursePar) || 72;
                let total = 0, rounds = 0;
                [p.r1, p.r2, p.r3, p.r4].forEach(r => { if(r > 0) { total += parseInt(r); rounds++; } });
                const toPar = rounds > 0 ? total - (par * rounds) : 0;
                const toParText = toPar === 0 ? 'E' : (toPar > 0 ? `+${toPar}` : toPar);

                const row = `
                    <tr>
                        <td class="pos center">${index + 1}</td>
                        <td>
                            <div class="player-cell">
                                <i class="fa-brands ${p.console || 'fa-gamepad'}"></i>
                                <span class="fi fi-${p.country || 'un'}"></span>
                                <span>${p.name}</span>
                            </div>
                        </td>
                        <td class="to-par center ${toPar < 0 ? 'under' : ''}">${toParText}</td>
                        <td class="center">${p.r1 || '-'}</td>
                        <td class="center">${p.r2 || '-'}</td>
                        <td class="r34 center ${hasR3 ? '' : 'hidden'}">${p.r3 || '-'}</td>
                        <td class="r34 center ${hasR3 ? '' : 'hidden'}">${p.r4 || '-'}</td>
                        <td class="total center">${total || '-'}</td>
                        <td class="prize">${p.prize || '$0'}</td>
                        <td class="center bonus-stat">${p.fir || '-'}</td>
                        <td class="center bonus-stat">${p.gir || '-'}</td>
                        <td class="center bonus-stat">${p.scrambling || '-'}</td>
                        <td class="center bonus-stat">${p.ntp || '-'}</td>
                    </tr>
                `;
                lbBody.innerHTML += row;
            });

            // Season Standings rendering
            const sortedPlayers = Object.keys(data.seasonPoints || {}).sort((a,b) => data.seasonPoints[b] - data.seasonPoints[a]);
            sortedPlayers.forEach(name => {
                const bonus = data.seasonBonusStats ? data.seasonBonusStats[name] : null;
                
                // Find original console/country from player list to duplicate here
                const pInfo = data.players.find(p => p.name === name) || {};

                const row = `
                    <tr>
                        <td>
                            <div class="player-cell">
                                <i class="fa-brands ${pInfo.console || 'fa-gamepad'}"></i>
                                <span class="fi fi-${pInfo.country || 'un'}"></span>
                                <span style="font-weight:bold">${name}</span>
                            </div>
                        </td>
                        <td class="center">${(data.seasonPoints[name] || 0).toLocaleString()}</td>
                        <td class="center col-earnings">$ ${(data.seasonEarnings[name] || 0).toLocaleString()}</td>
                        <td class="center">${data.seasonEvents[name] || 0}</td>
                        <td class="center">${bonus?.fir || '-'}</td>
                        <td class="center">${bonus?.gir || '-'}</td>
                        <td class="center">${bonus?.scrambling || '-'}</td>
                        <td class="center">${bonus?.ntp || '-'}</td>
                    </tr>
                `;
                stBody.innerHTML += row;
            });
        } catch (err) {
            document.body.innerHTML = `<div style="text-align:center; padding:50px;"><h2>Results not yet posted.</h2></div>`;
        }
    }
    window.onload = loadResults;
</script>
</body>
</html>
