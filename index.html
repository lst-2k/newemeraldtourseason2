<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour | Professional Series</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #1b5e20; --gold: #fbc02d; --dark: #333; --light-bg: #f4f4f4; 
                --ps-blue: #003791; --xb-green: #107c10; --st-grey: #171a21; }
        
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--light-bg); }
        
        /* Header & Logo */
        .header-wrap { width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container { background-color: var(--emerald); text-align: center; padding: 25px 10px; border-bottom: 4px solid var(--gold); cursor: pointer; }
        .logo-container img { width: 100%; max-width: 800px; height: auto; display: block; margin: 0 auto; }
        
        .venue-section { text-align: center; padding: 15px; background: white; }
        .venue-section h2 { color: var(--emerald); margin: 0; text-transform: uppercase; font-size: 28px; }
        .update-tag { font-size: 11px; color: #888; margin-top: 5px; }

        .info-bar-below { background-color: var(--dark); color: #ffeb3b; padding: 10px; display: flex; justify-content: center; gap: 40px; font-size: 14px; font-weight: bold; }
        .content-padding { padding: 10px; max-width: 1500px; margin: 0 auto; position: relative; }
        
        /* Forms */
        .submit-section, .admin-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--emerald); }
        .admin-section { background: #222; color: white; border-color: var(--gold); display: none; }
        .submit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; font-size: 14px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 4px; color: #666; text-transform: uppercase; }
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .btn-primary { background: var(--emerald); color: white; }
        .btn-admin { background: var(--gold); color: #222; }

        /* Tables */
        .table-container { width: 100%; overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 25px; }
        table { width: auto; min-width: 100%; border-collapse: collapse; }
        th { background-color: var(--emerald); color: white; padding: 12px 10px; font-size: 11px; text-transform: uppercase; white-space: nowrap; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; white-space: nowrap; }
        
        .player-cell { text-align: left !important; font-weight: bold; width: 1%; white-space: nowrap; padding-right: 40px; }
        .hcap-cell { width: 40px; color: #777; font-weight: normal; }
        
        /* Console Colors */
        .ps-icon { color: var(--ps-blue); }
        .xb-icon { color: var(--xb-green); }
        .st-icon { color: var(--st-grey); }
        .platform-icon { margin-right: 10px; font-size: 16px; width: 20px; text-align: center; }

        .net-cell { background-color: #e8f5e9; font-weight: bold; color: var(--emerald); }
        .winner-highlight { background-color: #fff9c4; font-weight: bold; outline: 2px solid var(--gold); }
        
        /* 2K25 Logo Section */
        .footer-logo-wrap { text-align: center; padding: 40px 0; opacity: 0.8; }
        .footer-logo-wrap img { max-width: 250px; height: auto; }

        /* Back to Top Button */
        #backToTop { position: fixed; bottom: 30px; right: 30px; background: var(--emerald); color: white; border: 2px solid var(--gold); 
                      width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; 
                      box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; transition: transform 0.2s; }
        #backToTop:hover { transform: scale(1.1); }

        .history-item { background: white; border: 1px solid var(--emerald); margin-bottom: 10px; border-radius: 5px; }
        .history-header { display: flex; padding: 15px; cursor: pointer; background: var(--emerald); color: white; font-weight: bold; justify-content: space-between; }
        .history-content { display: none; padding: 10px; overflow-x: auto; }
        .history-item.active .history-content { display: block; }
    </style>
</head>
<body>

    <button id="backToTop" onclick="window.scrollTo(0,0)"><i class="fa fa-chevron-up"></i></button>

    <div class="header-wrap">
        <div class="logo-container" id="admin-trigger"><img src="logo.png" alt="Emerald Tour Logo"></div>
        <div class="venue-section">
            <h2 id="current-venue">Emerald Tour</h2>
            <p id="total-prize-pool" style="font-size: 18px; margin: 5px 0; font-weight: bold;">Main Pool: --</p>
            <div class="update-tag">LIVE SYNC: <span id="last-update-time">--</span></div>
        </div>
        <div class="info-bar-below">
            <div>EVENT DATE: <span id="event-date">--</span></div>
            <div>COURSE PAR: <span id="course-par">--</span></div>
        </div>
    </div>

    <div class="content-padding">
        <div id="admin-panel" class="admin-section">
            <h3 style="color:var(--gold); margin-top:0;">Tournament Director</h3>
            <div class="submit-grid">
                <div><label>Venue</label><input type="text" id="admin-venue"></div>
                <div><label>Par</label><input type="number" id="admin-par"></div>
                <div><label>Date</label><input type="text" id="admin-date"></div>
                <div><label>Main Pool $</label><input type="number" id="admin-pool"></div>
            </div>
            <button id="saveSettingsBtn" class="btn btn-admin">Update Tournament Info</button>
            <hr style="border-color: #444; margin: 20px 0;">
            <div class="submit-grid">
                <input type="text" id="admin-corr-name" placeholder="Exact Player Name">
                <div><label>FIR %</label><input type="number" id="admin-corr-fir" step="0.01"></div>
                <div><label>GIR %</label><input type="number" id="admin-corr-gir" step="0.01"></div>
                <div><label>SCR %</label><input type="number" id="admin-corr-scr" step="0.01"></div>
                <div><label>NTP Yds</label><input type="number" id="admin-corr-ntp" step="0.01"></div>
            </div>
            <button id="adminUpdateStatsBtn" class="btn" style="background:#444; color:white;">Force Update Stats</button>
            <div style="display:flex; gap:10px; margin-top: 15px;">
                <button id="archiveEventBtn" class="btn" style="background:#0277bd; color:white">Archive & Update Season</button>
                <button id="clearBoardBtn" class="btn" style="background:#b71c1c; color:white">Reset Weekly Scores</button>
            </div>
        </div>

        <div class="submit-section">
            <h3 style="color:var(--emerald); margin-top:0">⛳ Submit Card</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px; margin-bottom: 10px;">
                <div><label>Name</label><input type="text" id="form-name"></div>
                <div><label>PIN</label><input type="password" id="form-pin" maxlength="4"></div>
                <div><label>Platform</label>
                    <select id="form-platform">
                        <option value="ps-icon fa-brands fa-playstation">PlayStation 5</option>
                        <option value="xb-icon fa-brands fa-xbox">Xbox</option>
                        <option value="st-icon fa-brands fa-steam">PC</option>
                    </select>
                </div>
            </div>
            <div class="submit-grid">
                <div><label>HCP</label><input type="number" id="form-hcap" value="0"></div>
                <div><label>R1</label><input type="number" id="form-r1"></div>
                <div><label>R2</label><input type="number" id="form-r2"></div>
                <div><label>R3</label><input type="number" id="form-r3"></div>
                <div><label>R4</label><input type="number" id="form-r4"></div>
                <div><label>FIR %</label><input type="number" id="form-fir" step="0.01"></div>
                <div><label>GIR %</label><input type="number" id="form-gir" step="0.01"></div>
                <div><label>SCR %</label><input type="number" id="form-scram" step="0.01"></div>
                <div><label>NTP Yds</label><input type="number" id="form-ntp" step="0.01"></div>
            </div>
            <button class="btn btn-primary" id="submitScoreBtn">Post Scorecard</button>
        </div>

        <h3 style="text-align:center; color:var(--emerald); letter-spacing:1px;">LIVE LEADERBOARD</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th><th class="player-cell">PLAYER</th><th class="hcap-cell">HCP</th>
                        <th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>GROSS</th><th>NET</th><th>TP</th>
                        <th>FIR %</th><th>GIR %</th><th>SCR %</th><th>NTP</th><th>PTS</th><th>WEEK $</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <h3 style="text-align:center; color:var(--emerald); letter-spacing:1px;">SEASON STANDINGS</h3>
        <div class="table-container">
            <table>
                <thead><tr><th>RANK</th><th class="player-cell">PLAYER</th><th>EV</th><th>POINTS</th><th style="text-align:right">CAREER EARNINGS</th></tr></thead>
                <tbody id="season-body"></tbody>
            </table>
        </div>

        <div class="footer-logo-wrap">
            <img src="2k25-logo.png" alt="PGA Tour 2K25">
        </div>

        <h3 style="text-align:center; color:var(--emerald); letter-spacing:1px;">EVENT ARCHIVE</h3>
        <div id="history-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, orderBy, addDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDXQU4I1XvkNi-XE4f5q7dixo3BrVkfuC8",
		  authDomain: "emeraldtour2-f556d.firebaseapp.com",
		  projectId: "emeraldtour2-f556d",
		  storageBucket: "emeraldtour2-f556d.firebasestorage.app",
		  messagingSenderId: "148269100724",
		  appId: "1:148269100724:web:32410ea4096b26fec5f1e1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scoresCol = collection(db, "live_tournament");
        const settingsDoc = doc(db, "settings", "current_event");

        const payoutTable = [0.18, 0.108, 0.068, 0.048, 0.04, 0.036, 0.0335, 0.031, 0.029, 0.027, 0.025, 0.023, 0.021, 0.019, 0.018, 0.017, 0.016, 0.015, 0.014, 0.013];
        const ptsTable = [500, 300, 190, 135, 110, 100, 95, 90, 85, 80, 75, 70, 65, 60, 57, 54, 51, 48, 45, 42];

        // Back to Top Logic
        window.onscroll = () => { document.getElementById('backToTop').style.display = window.scrollY > 400 ? 'flex' : 'none'; };

        // Admin Trigger
        let clicks = 0;
        document.getElementById('admin-trigger').onclick = () => { if(++clicks === 5) { if(prompt("Admin Pass:") === "emerald2024") document.getElementById('admin-panel').style.display='block'; clicks=0; }};

        // Submit Score
        document.getElementById('submitScoreBtn').onclick = async () => {
            const name = document.getElementById('form-name').value.trim();
            const pin = document.getElementById('form-pin').value.trim();
            if(!name || pin.length < 4) return alert("Enter Name & 4-Digit PIN");
            const id = name.toLowerCase().replace(/\s+/g, '-');
            const ref = doc(db, "live_tournament", id);
            const snap = await getDoc(ref);
            if(snap.exists() && snap.data().pin !== pin) return alert("Wrong PIN.");

            await setDoc(ref, {
                name, pin, console: document.getElementById('form-platform').value,
                hcap: parseInt(document.getElementById('form-hcap').value)||0,
                r1: parseInt(document.getElementById('form-r1').value)||0,
                r2: parseInt(document.getElementById('form-r2').value)||0,
                r3: parseInt(document.getElementById('form-r3').value)||0,
                r4: parseInt(document.getElementById('form-r4').value)||0,
                fir: parseFloat(document.getElementById('form-fir').value)||0,
                gir: parseFloat(document.getElementById('form-gir').value)||0,
                scram: parseFloat(document.getElementById('form-scram').value)||0,
                ntp: parseFloat(document.getElementById('form-ntp').value)||0
            }, { merge: true });
            alert("Updated!");
        };

        // Admin Manual Update
        document.getElementById('adminUpdateStatsBtn').onclick = async () => {
            const name = document.getElementById('admin-corr-name').value.trim();
            const id = name.toLowerCase().replace(/\s+/g, '-');
            await setDoc(doc(db, "live_tournament", id), {
                fir: parseFloat(document.getElementById('admin-corr-fir').value)||0,
                gir: parseFloat(document.getElementById('admin-corr-gir').value)||0,
                scram: parseFloat(document.getElementById('admin-corr-scr').value)||0,
                ntp: parseFloat(document.getElementById('admin-corr-ntp').value)||0
            }, { merge: true });
            alert("Stats Overridden!");
        };

        // Admin Reset
        document.getElementById('clearBoardBtn').onclick = async () => {
            if(confirm("Reset scores for new week?")){
                const snap = await getDocs(scoresCol);
                const batch = snap.docs.map(d => setDoc(doc(db, "live_tournament", d.id), {
                    r1:0, r2:0, r3:0, r4:0, fir:0, gir:0, scram:0, ntp:0
                }, { merge: true }));
                await Promise.all(batch);
                alert("Scores Wiped.");
            }
        };

        // Sync Data
        onSnapshot(scoresCol, async (snapshot) => {
            const sSnap = await getDoc(settingsDoc);
            const s = sSnap.exists() ? sSnap.data() : {venue:"TBD", par:72, pool:0};
            document.getElementById('current-venue').innerText = s.venue;
            document.getElementById('course-par').innerText = s.par;
            document.getElementById('event-date').innerText = s.date || "--";
            document.getElementById('total-prize-pool').innerText = `Main Pool: $${(parseInt(s.pool)||0).toLocaleString()}`;
            document.getElementById('last-update-time').innerText = new Date().toLocaleTimeString();
            
            let players = [];
            snapshot.forEach(d => players.push({...d.data(), id: d.id}));
            renderBoard(players, parseInt(s.par), parseInt(s.pool));
        });

        function renderBoard(playersData, par, pool) {
            let ps = playersData.map(p => {
                const rs = [p.r1, p.r2, p.r3, p.r4].map(v => parseInt(v)||0);
                const act = rs.filter(r => r > 0).length;
                const gross = rs.reduce((a,b)=>a+b, 0);
                const net = act > 0 ? gross - (p.hcap||0) : 0;
                const tp = act > 0 ? net - (par * act) : 999;
                return { ...p, gross, net, tp, act };
            }).sort((a,b) => a.tp - b.tp);

            const active = ps.filter(p => p.act > 0);
            const bF = Math.max(...active.map(p => p.fir||0), -1);
            const bG = Math.max(...active.map(p => p.gir||0), -1);
            const bS = Math.max(...active.map(p => p.scram||0), -1);
            const vN = active.filter(p => p.ntp > 0).map(p => p.ntp);
            const bN = vN.length > 0 ? Math.min(...vN) : 999;

            const cF = active.filter(p => p.fir === bF && bF > 0).length;
            const cG = active.filter(p => p.gir === bG && bG > 0).length;
            const cS = active.filter(p => p.scram === bS && bS > 0).length;
            const cN = active.filter(p => p.ntp === bN && bN < 999).length;

            let i=0, rank=1, html="";
            while(i < ps.length){
                if(ps[i].act === 0){ i++; continue; }
                let ties=0; while(i+ties < ps.length && ps[i+ties].tp === ps[i].tp) ties++;
                let sP=0, sM=0;
                for(let p=rank; p<rank+ties; p++) {
                    if(p<=20) { sP += ptsTable[p-1]; sM += (payoutTable[p-1] * pool); }
                }
                const avgPts = Math.round(sP/ties);
                const avgMoney = Math.round(sM/ties);

                for(let j=0; j<ties; j++){
                    const p = ps[i+j];
                    let bonus = 0;
                    if(p.fir === bF && bF > 0) bonus += (10000 / cF);
                    if(p.gir === bG && bG > 0) bonus += (10000 / cG);
                    if(p.scram === bS && bS > 0) bonus += (10000 / cS);
                    if(p.ntp === bN && bN < 999) bonus += (10000 / cN);

                    const total = avgMoney + bonus;
                    const tScore = p.tp === 0 ? 'E' : (p.tp > 0 ? '+'+p.tp : p.tp);
                    
                    html += `<tr>
                        <td>${ties>1?'T'+rank:rank}</td>
                        <td class="player-cell"><i class="${p.console || 'fa-solid fa-golf-ball'} platform-icon"></i>${p.name}</td>
                        <td class="hcap-cell">${p.hcap}</td>
                        <td>${p.r1||'-'}</td><td>${p.r2||'-'}</td><td>${p.r3||'-'}</td><td>${p.r4||'-'}</td>
                        <td>${p.gross}</td><td class="net-cell">${p.net}</td><td style="font-weight:bold">${tScore}</td>
                        <td class="${p.fir===bF && bF>0?'winner-highlight':''}">${p.fir.toFixed(2)}%</td>
                        <td class="${p.gir===bG && bG>0?'winner-highlight':''}">${p.gir.toFixed(2)}%</td>
                        <td class="${p.scram===bS && bS>0?'winner-highlight':''}">${p.scram.toFixed(2)}%</td>
                        <td class="${p.ntp===bN && bN<999?'winner-highlight':''}">${p.ntp?p.ntp.toFixed(2)+'y':'-'}</td>
                        <td style="font-weight:bold">${avgPts}</td>
                        <td style="font-weight:bold; color:var(--emerald)">$${Math.round(total).toLocaleString()}</td>
                    </tr>`;
                    p.tempPts = avgPts; p.tempMoney = Math.round(total);
                }
                i+=ties; rank+=ties;
            }
            document.getElementById('leaderboard-body').innerHTML = html;
            window.currentCalculatedPlayers = ps; 
        }

        // Archive
        document.getElementById('archiveEventBtn').onclick = async () => {
            if(!confirm("Push results to Season Standings?")) return;
            const sSnap = await getDoc(settingsDoc);
            const s = sSnap.data();
            const players = window.currentCalculatedPlayers || [];
            let archived = [];
            for(const p of players) {
                if(p.act === 0) continue;
                await setDoc(doc(db, "season_stats", p.id), {
                    name: p.name, pts: increment(p.tempPts), earnings: increment(p.tempMoney), events: increment(1), console: p.console
                }, { merge: true });
                archived.push({name:p.name, gross:p.gross, net:p.net, tp:p.tp, pts:p.tempPts, prize:p.tempMoney});
            }
            await addDoc(collection(db, "event_history"), { venue:s.venue, date:s.date, details:archived, timestamp:new Date() });
            alert("Season Totals Updated!");
        };

        // Season Stats Sync
        onSnapshot(query(collection(db, "season_stats"), orderBy("pts", "desc")), (snap) => {
            let html = "", r=1;
            snap.forEach(d => {
                const p = d.data();
                html += `<tr><td>${r++}</td><td class="player-cell"><i class="${p.console || ''} platform-icon"></i>${p.name}</td><td>${p.events}</td><td style="font-weight:bold; color:var(--emerald)">${p.pts}</td><td style="text-align:right; font-weight:bold">$${(p.earnings||0).toLocaleString()}</td></tr>`;
            });
            document.getElementById('season-body').innerHTML = html;
        });

        // History Sync
        onSnapshot(query(collection(db, "event_history"), orderBy("timestamp", "desc")), (snap) => {
            let html = "";
            snap.forEach(d => {
                const h = d.data();
                const rows = (h.details||[]).map((r,idx) => `<tr><td>${idx+1}</td><td class="player-cell">${r.name}</td><td>${r.gross}</td><td>${r.net}</td><td>${r.tp}</td><td>${r.pts}</td><td>$${r.prize.toLocaleString()}</td></tr>`).join('');
                html += `<div class="history-item"><div class="history-header" onclick="this.parentElement.classList.toggle('active')"><span>${h.venue}</span><span>${h.date} ▼</span></div><div class="history-content"><table><thead><tr><th>POS</th><th class="player-cell">PLAYER</th><th>G</th><th>N</th><th>TP</th><th>PTS</th><th>$</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            });
            document.getElementById('history-container').innerHTML = html;
        });
    </script>
</body>
</html>
