<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emerald Tour - Official Standings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --emerald: #228B22; 
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        
        /* Edge-to-edge body */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f0; 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            min-height: 100vh;
        }
        
        /* Image Header flush with container */
        .image-header {
            margin: -25px -25px 20px -25px;
            overflow: hidden;
            border-radius: 0;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .mid-logo-container {
            width: 100%;
            text-align: center;
            margin: 20px 0 40px 0;
        }
        .mid-logo {
            max-width: 400px;
            width: 80%;
            height: auto;
        }

        .event-info-bar {
            text-align: center;
            margin: 25px 0;
            letter-spacing: 1px;
        }

        .week-title {
            font-size: 1.8em;
            font-weight: 800;
            color: var(--emerald);
            text-transform: uppercase;
        }

        .date-subtitle {
            font-size: 1em;
            color: #666;
            font-weight: 600;
            margin-top: 5px;
        }

        h3 { border-bottom: 2px solid var(--emerald); padding-bottom: 10px; color: #222; margin-top: 40px; }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        
        thead th { 
            position: sticky; 
            top: 0; 
            background: var(--emerald); 
            color: white; 
            padding: 14px 10px; 
            text-align: left; 
            font-size: 0.75em; 
            z-index: 10;
            text-transform: uppercase;
        }
		.playoff-zone {
			background-color: rgba(34, 139, 34, 0.1) !important; /* Light Emerald tint */
			border-left: 4px solid var(--emerald);
		}
		.q-marker {
			color: var(--emerald);
			font-weight: 800;
			margin-left: 6px;
			font-size: 0.9em;
		}
		/* Special Major Styling */
			.major-event {
				background: linear-gradient(135deg, #4b0082 0%, #2e004f 100%) !important; /* Deep Purple */
				color: white !important;
				border-radius: 8px;
				padding: 15px;
				position: relative;
			}

			.major-event .week-title { color: #ffd700 !important; } /* Gold Title */
			.major-event .date-subtitle { color: #e0e0e0 !important; }

			.major-tag {
				background: #ffd700;
				color: #000;
				font-weight: 900;
				padding: 2px 10px;
				border-radius: 4px;
				font-size: 0.7em;
				vertical-align: middle;
				margin-left: 10px;
				box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
				text-transform: uppercase;
			}

        td { padding: 12px 10px; border-bottom: 1px solid #eee; background: white; }

        .player-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .under-par { color: #d9534f; font-weight: bold; }
        .even-par { color: #228B22; font-weight: bold; }
        .bonus-stat { font-size: 0.85em; color: #555; background: #fafafa; text-align: center; border-left: 1px solid #eee; }
        .total-cell { font-weight: bold; text-align: center; background: #fafffa; border-left: 2px solid #eee; }
        .hidden-col { display: none; }

        #season-body tr:nth-child(1) td { background: #fffdf2; border-left: 6px solid var(--gold); }
        #season-body tr:nth-child(2) td { background: #f9f9f9; border-left: 6px solid var(--silver); }
        #season-body tr:nth-child(3) td { background: #fffaf7; border-left: 6px solid var(--bronze); }
        
        .fa-playstation { color: #003791; }
        .fa-xbox { color: #107C10; }
        .fa-steam { color: #171a21; }
        .fi { border-radius: 2px; flex-shrink: 0; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            body { background-color: white; }
            .container { padding: 10px 5px; border-radius: 0; box-shadow: none; }
            .image-header { margin: -10px -5px 20px -5px; }
            .week-title { font-size: 1.4em; }
            h3 { font-size: 1.1em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-header">
        <img src="logo.png" alt="Emerald Tour Logo" class="banner-img">
        <img src="event.png" alt="Event Banner" class="banner-img">
    </div>

    <div class="event-info-bar">
        <div class="week-title" id="display-week">LOADING...</div>
        <div class="date-subtitle" id="display-date">LOADING...</div>
    </div>

    <h3>Tournament Leaderboard</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Player</th>
                    <th>To Par</th>
                    <th>R1</th>
                    <th>R2</th>
                    <th class="col-r3">R3</th>
                    <th class="col-r4">R4</th>
                    <th style="text-align:center">Total</th>
					<th style="text-align:center">Points</th>
					<th style="text-align:center">Prize</th>
                    <th style="text-align:center">FiR</th>
                    <th style="text-align:center">GiR</th>
                    <th style="text-align:center">Scram</th>
                    <th style="text-align:center">NTP</th>
                </tr>
            </thead>
            <tbody id="tournament-body"></tbody>
        </table>
    </div>

    <div class="mid-logo-container">
        <img src="2k25 logo.png" alt="PGA 2K25 Logo" class="mid-logo">
    </div>

    <h3>Season Standings</h3>
    <div class="table-container">
        <table id="season-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Events</th>
                    <th>Points</th>
                    <th>Earnings</th>
                </tr>
            </thead>
            <tbody id="season-body"></tbody>
        </table>
    </div>
</div>

<script>
fetch('data.json')
    .then(response => response.json())
    .then(data => {
        // 1. Update Header & Branding
        const infoBar = document.querySelector('.event-info-bar'); // The container for venue/date
        const titleEl = document.getElementById('display-week');
        const dateEl = document.getElementById('display-date');
        
        // Apply Special Major/Signature Styling
        if (data.isSignature) {
            infoBar.classList.add('major-event');
            titleEl.innerHTML = `${data.venue} <span class="major-tag">MAJOR</span>`;
        } else {
            infoBar.classList.remove('major-event');
            titleEl.textContent = data.venue || "SEASON 1 | WEEK 1";
        }
        
        dateEl.textContent = data.date || "Course Name - Date";
        document.getElementById('course-par').textContent = data.coursePar || "72";

        // 2. Logic for Round Visibility
        // Checks if any player has a score in R3 or R4 to decide if columns should show
        const hasR3 = data.players.some(p => p.r3 && p.r3 !== "");
        const hasR4 = data.players.some(p => p.r4 && p.r4 !== "");

        // Update Table Headers visibility
        document.querySelectorAll('.col-r3').forEach(el => el.style.display = hasR3 ? 'table-cell' : 'none');
        document.querySelectorAll('.col-r4').forEach(el => el.style.display = hasR4 ? 'table-cell' : 'none');

        // 3. Render the Tournament Leaderboard
        renderTournament(data.players, parseInt(data.coursePar), hasR3, hasR4);

        // 4. Render the Season Standings
        // Pass the objects directly from the JSON
        renderSeason(data.seasonPoints, data.seasonEarnings, data.seasonEvents);
    })
    .catch(error => {
        console.error('Error loading tournament data:', error);
        document.getElementById('tournament-body').innerHTML = '<tr><td colspan="14" style="text-align:center;">Error loading data. Please check back later.</td></tr>';
    });

		function renderTournament(players, coursePar, showR3, showR4) {
			const tbody = document.getElementById('tournament-body');
			// Sorts the leaderboard by total score (lowest to highest)
			const sorted = [...players].sort((a,b) => (parseInt(calculateTotal(a)) || 999) - (parseInt(calculateTotal(b)) || 999));
			
			tbody.innerHTML = sorted.map((p, i) => {
				// Helper to ensure we don't add units to empty/dash values
				const formatStat = (val, unit) => (val && val !== '-' && val !== '') ? `${val}${unit}` : '-';

				return `
				<tr>
					<td>${i + 1}</td>
					<td>
						<div class="player-cell">
							<i class="fa-brands ${p.console}"></i>
							<span class="fi fi-${p.country}"></span>
							<strong>${p.name}</strong>
						</div>
					</td>
					<td>${formatToPar(p, coursePar)}</td>
					<td>${p.r1 || '-'}</td>
					<td>${p.r2 || '-'}</td>
					<td class="${showR3 ? '' : 'hidden-col'}">${p.r3 || '-'}</td>
					<td class="${showR4 ? '' : 'hidden-col'}">${p.r4 || '-'}</td>
					<td class="total-cell">${calculateTotal(p)}</td>
					
					<td style="text-align:center; font-weight:bold; color:var(--emerald);">${p.points || '-'}</td>
					<td style="text-align:center; font-weight:bold;">${p.prize || '$0'}</td>
					
					<td class="bonus-stat">${formatStat(p.fir, '%')}</td>
					<td class="bonus-stat">${formatStat(p.gir, '%')}</td>
					<td class="bonus-stat">${formatStat(p.scrambling, '%')}</td>
					<td class="bonus-stat">${formatStat(p.ntp, 'ft')}</td>
				</tr>
			`}).join('');
		}

		function renderSeason(points, earnings, events) {
			const tbody = document.getElementById('season-body');
			const names = Object.keys(points).sort((a, b) => points[b] - points[a]);
			
			// Calculate the 50% cutoff
			const totalPlayers = names.length;
			const cutoff = Math.ceil(totalPlayers / 2);

			tbody.innerHTML = names.map((name, i) => {
				const isPlayoffQualified = (i < cutoff && totalPlayers > 1);
				const rowClass = isPlayoffQualified ? 'playoff-zone' : '';
				const badge = isPlayoffQualified ? '<span class="q-marker">(Q)</span>' : '';

				return `
					<tr class="${rowClass}">
						<td>${i + 1}</td>
						<td style="font-weight:bold;">${name}${badge}</td>
						<td>${events[name] || 0}</td>
						<td style="color:var(--emerald); font-weight:bold;">${points[name].toLocaleString()}</td>
						<td>$${earnings[name].toLocaleString()}</td>
					</tr>
				`;
			}).join('');
		}

		function calculateTotal(p) {
			let t = (parseInt(p.r1)||0) + (parseInt(p.r2)||0) + (parseInt(p.r3)||0) + (parseInt(p.r4)||0);
			return t === 0 ? '-' : t;
		}

		function formatToPar(p, coursePar) {
			let total = calculateTotal(p);
			if(total === '-') return '-';
			let rounds = [p.r1, p.r2, p.r3, p.r4].filter(r => r !== "").length;
			let diff = total - (coursePar * rounds);
			if (diff < 0) return `<span class="under-par">${diff}</span>`;
			if (diff === 0) return `<span class="even-par">E</span>`;
			return `<span class="over-par">+${diff}</span>`;
		}
</script>
</body>
</html>
