<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #124d12; --gold: #FFD700; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; color: #333; }
        .leaderboard-container { max-width: 1450px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header img, .event-banner { width: 100%; height: auto; display: block; }
        .venue-bar { background: #333; color: white; padding: 12px; text-align: center; display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; font-weight: bold; }
        .venue-bar span { color: var(--gold); text-transform: uppercase; font-size: 11px; margin-right: 5px; }
        .section-title { background: var(--emerald); color: white; padding: 12px 20px; font-size: 18px; font-weight: bold; border-left: 10px solid var(--gold); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f8f8; padding: 12px; font-size: 11px; border-bottom: 2px solid #eee; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .player-cell { text-align: left; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .to-par { font-weight: 800; } .under { color: #d32f2f; } .even { color: #2e7d32; }
        .middle-logo-divider { text-align: center; padding: 40px; background: #fff; }
        .middle-logo-divider img { max-height: 60px; }
        .bottom-logo-divider { text-align: center; padding: 20px; }
        .bottom-logo-divider img { max-height: 60px; width: auto; }
        
        /* History Accordion */
        .history-item { border-bottom: 1px solid #eee; }
        .history-header { padding: 15px 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; background: #fff; }
        .history-header:hover { background: #f9f9f9; }
        .history-content { display: none; padding: 15px 20px; background: #fcfcfc; font-size: 14px; }
        .active .history-content { display: block; }

        /* HOF Cards */
        .hof-container { padding: 40px; background: var(--dark); color: white; text-align: center; }
        .hof-cards { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .hof-card { background: linear-gradient(135deg, #333, #111); padding: 20px; border-radius: 12px; width: 220px; border: 1px solid rgba(255,215,0,0.3); }
        .hof-medal { font-size: 40px; display: block; }
        .hof-wins { color: var(--gold); font-weight: bold; margin-top: 10px; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="header"><img src="logo.png"></div>
    <img src="event.png" class="event-banner">
    <div id="venue-display" class="venue-bar"></div>

    <div class="section-title">Current Leaderboard</div>
    <div style="overflow-x:auto">
        <table>
            <thead><tr><th>POS</th><th style="text-align:left">PLAYER</th><th>TO PAR</th><th>R1</th><th>R2</th><th id="th-r3" class="hidden">R3</th><th id="th-r4" class="hidden">R4</th><th>TOT</th><th>PRIZE</th><th style="background:#fffdf0">BONUS</th></tr></thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div class="middle-logo-divider"><img src="sponsor.png"></div>

    <div class="section-title">Season Standings</div>
    <div style="overflow-x:auto">
        <table>
            <thead><tr><th>POS</th><th style="text-align:left">PLAYER</th><th class="txt-right">POINTS</th><th class="txt-right">EARNINGS</th></tr></thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>

    <div class="section-title">Tournament History</div>
    <div id="history-container"></div>

    <div class="bottom-logo-divider"><img src="2k25 logo.png"></div>

    <div class="hof-container">
        <h2 style="color:var(--gold)">🏆 SEASON HALL OF FAME 🏆</h2>
        <div id="hof-display" class="hof-cards"></div>
    </div>
</div>

<script>
    async function fetchData() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            render(data);
        } catch (e) { console.error("Fetch Error:", e); }
    }

    function render(data) {
        // 1. Update Venue Bar
        document.getElementById('venue-display').innerHTML = `
            <div><span>Venue:</span> ${data.venue || '--'}</div>
            <div><span>Date:</span> ${data.date || '--'}</div>
            <div><span>Par:</span> ${data.coursePar || '--'}</div>
            <div><span>Purse:</span> ${data.prizePool || '--'}</div>
        `;
        
        const hasExtra = data.players.some(p => p.r3 || p.r4);
        if(hasExtra) { 
            document.getElementById('th-r3').classList.remove('hidden'); 
            document.getElementById('th-r4').classList.remove('hidden'); 
        }

        // 2. Leaderboard Rendering
        const lb = document.getElementById('leaderboard-body');
        lb.innerHTML = '';
        data.players.forEach((p, i) => {
            const scores = [p.r1, p.r2, p.r3, p.r4].filter(s => s && s !== "");
            const tot = scores.reduce((a, b) => parseInt(a) + parseInt(b), 0);
            const parDiff = tot - (parseInt(data.coursePar) * scores.length);
            const toPar = parDiff === 0 ? 'E' : (parDiff > 0 ? '+'+parDiff : parDiff);
            
            // Calculate Bonus Total for display
            let bCount = 0;
            if(p.fir) bCount++; if(p.gir) bCount++; if(p.scrambling) bCount++; if(p.ntp) bCount++;
            const bonusVal = bCount * 10000 * (data.isSignature ? 2 : 1);

            lb.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td class="player-cell">
                        <i class="fa-brands ${p.console}"></i> 
                        <span class="fi fi-${p.country}"></span> ${p.name}
                    </td>
                    <td class="to-par ${parDiff<0?'under':parDiff===0?'even':''}">${toPar}</td>
                    <td>${p.r1||'-'}</td><td>${p.r2||'-'}</td>
                    <td class="${hasExtra?'':'hidden'}">${p.r3||'-'}</td>
                    <td class="${hasExtra?'':'hidden'}">${p.r4||'-'}</td>
                    <td><b>${tot}</b></td>
                    <td class="col-money">${p.prize || '$0'}</td>
                    <td class="col-bonus-payout">$${bonusVal.toLocaleString()}</td>
                </tr>
            `;
        });

        // 3. Season Standings Rendering (Including Events)
        const st = document.getElementById('standings-body');
        st.innerHTML = '';
        const sortedStandings = Object.keys(data.seasonPoints || {}).map(name => ({
            name, 
            pts: data.seasonPoints[name], 
            earn: data.seasonEarnings[name],
            evs: data.seasonEvents ? data.seasonEvents[name] : 0 // Pulls the seasonEvents value
        })).sort((a,b) => b.pts - a.pts);

        sortedStandings.forEach((s, i) => {
            st.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td class="player-cell">${s.name}</td>
                    <td style="text-align:right; padding-right:30px;">${s.pts.toLocaleString()}</td>
                    <td style="text-align:right; padding-right:30px;"><b>$${s.earn.toLocaleString()}</b></td>
                    <td style="text-align:right; padding-right:30px;">${s.evs}</td> 
                </tr>
            `;
        });

        // 4. History Rendering
        const hist = document.getElementById('history-container');
        hist.innerHTML = '';
        if(data.history) {
            [...data.history].reverse().forEach((h, i) => {
                hist.innerHTML += `
                    <div class="history-item" onclick="this.classList.toggle('active')">
                        <div class="history-header">
                            Week ${data.history.length-i}: ${h.venue} <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="history-content">
                            Winner: <b>${h.winner}</b> | Score: ${h.score} | Prize: ${h.prize}
                        </div>
                    </div>`;
            });
        }

        // 5. Hall of Fame Rendering
        const hof = document.getElementById('hof-display');
        hof.innerHTML = '';
        const top3 = Object.keys(data.seasonEarnings || {}).map(n => ({ 
            name: n, 
            earn: data.seasonEarnings[n], 
            wins: data.seasonWins ? data.seasonWins[n] : 0 
        })).sort((a,b) => b.earn - a.earn).slice(0,3);

        const medals = ['🥇','🥈','🥉'];
        top3.forEach((p, i) => {
            hof.innerHTML += `
                <div class="hof-card">
                    <span class="hof-medal">${medals[i]}</span>
                    <b>${p.name}</b><br>
                    Earnings: $${p.earn.toLocaleString()}<br>
                    <span class="hof-wins">🏆 ${p.wins} Wins</span>
                </div>`;
        });
    }
    window.onload = fetchData;
</script>
</body>
</html>
