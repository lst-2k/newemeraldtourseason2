<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emerald Tour - Official Standings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --emerald: #228B22; 
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        
        /* Edge-to-edge body */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f0; 
            margin: 0; 
            padding: 0; 
            color: #333; 
        }

        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            min-height: 100vh;
        }
        
        /* Image Header flush with container */
        .image-header {
            margin: -25px -25px 20px -25px;
            overflow: hidden;
            border-radius: 0;
        }

        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .mid-logo-container {
            width: 100%;
            text-align: center;
            margin: 20px 0 40px 0;
        }
        .mid-logo {
            max-width: 400px;
            width: 80%;
            height: auto;
        }

        .event-info-bar {
            text-align: center;
            margin: 25px 0;
            letter-spacing: 1px;
        }

        .week-title {
            font-size: 1.8em;
            font-weight: 800;
            color: var(--emerald);
            text-transform: uppercase;
        }

        .date-subtitle {
            font-size: 1em;
            color: #666;
            font-weight: 600;
            margin-top: 5px;
        }

        h3 { border-bottom: 2px solid var(--emerald); padding-bottom: 10px; color: #222; margin-top: 40px; }

        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        
        thead th { 
            position: sticky; 
            top: 0; 
            background: var(--emerald); 
            color: white; 
            padding: 14px 10px; 
            text-align: left; 
            font-size: 0.75em; 
            z-index: 10;
            text-transform: uppercase;
        }

        td { padding: 12px 10px; border-bottom: 1px solid #eee; background: white; }

        .player-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .under-par { color: #d9534f; font-weight: bold; }
        .even-par { color: #228B22; font-weight: bold; }
        .bonus-stat { font-size: 0.85em; color: #555; background: #fafafa; text-align: center; border-left: 1px solid #eee; }
        .total-cell { font-weight: bold; text-align: center; background: #fafffa; border-left: 2px solid #eee; }
        .hidden-col { display: none; }

        #season-body tr:nth-child(1) td { background: #fffdf2; border-left: 6px solid var(--gold); }
        #season-body tr:nth-child(2) td { background: #f9f9f9; border-left: 6px solid var(--silver); }
        #season-body tr:nth-child(3) td { background: #fffaf7; border-left: 6px solid var(--bronze); }
        
        .fa-playstation { color: #003791; }
        .fa-xbox { color: #107C10; }
        .fa-steam { color: #171a21; }
        .fi { border-radius: 2px; flex-shrink: 0; }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 600px) {
            body { background-color: white; }
            .container { padding: 10px 5px; border-radius: 0; box-shadow: none; }
            .image-header { margin: -10px -5px 20px -5px; }
            .week-title { font-size: 1.4em; }
            h3 { font-size: 1.1em; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-header">
        <img src="logo.png" alt="Emerald Tour Logo" class="banner-img">
        <img src="event.png" alt="Event Banner" class="banner-img">
    </div>

    <div class="event-info-bar">
        <div class="week-title" id="display-week">LOADING...</div>
        <div class="date-subtitle" id="display-date">LOADING...</div>
    </div>

    <h3>Tournament Leaderboard</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Player</th>
                    <th>To Par</th>
                    <th>R1</th>
                    <th>R2</th>
                    <th class="col-r3">R3</th>
                    <th class="col-r4">R4</th>
                    <th style="text-align:center">Total</th>
					<th style="text-align:center">Points</th>
					<th style="text-align:center">Prize</th>
                    <th style="text-align:center">FiR</th>
                    <th style="text-align:center">GiR</th>
                    <th style="text-align:center">Scram</th>
                    <th style="text-align:center">NTP</th>
                </tr>
            </thead>
            <tbody id="tournament-body"></tbody>
        </table>
    </div>

    <div class="mid-logo-container">
        <img src="2k25 logo.png" alt="PGA 2K25 Logo" class="mid-logo">
    </div>

    <h3>Season Standings</h3>
    <div class="table-container">
        <table id="season-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Events</th>
                    <th>Points</th>
                    <th>Earnings</th>
                </tr>
            </thead>
            <tbody id="season-body"></tbody>
        </table>
    </div>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('display-week').textContent = data.venue || "SEASON 1 | WEEK 1";
            document.getElementById('display-date').textContent = data.date || "DATE TBD";
            
            const coursePar = parseInt(data.coursePar) || 72;
            const hasR3 = data.players.some(p => p.r3 && p.r3 !== "");
            const hasR4 = data.players.some(p => p.r4 && p.r4 !== "");
            
            if(!hasR3) document.querySelectorAll('.col-r3').forEach(el => el.classList.add('hidden-col'));
            if(!hasR4) document.querySelectorAll('.col-r4').forEach(el => el.classList.add('hidden-col'));

            renderTournament(data.players, coursePar, hasR3, hasR4);
            renderSeason(data.seasonPoints, data.seasonEarnings, data.seasonEvents, data.players);
        });

		function renderTournament(players, coursePar, showR3, showR4) {
			const tbody = document.getElementById('tournament-body');
			const sorted = [...players].sort((a,b) => (parseInt(calculateTotal(a)) || 999) - (parseInt(calculateTotal(b)) || 999));
			
			tbody.innerHTML = sorted.map((p, i) => `
				<tr>
					<td>${i + 1}</td>
					<td>
						<div class="player-cell">
							<i class="fa-brands ${p.console}"></i>
							<span class="fi fi-${p.country}"></span>
							<strong>${p.name}</strong>
						</div>
					</td>
					<td>${formatToPar(p, coursePar)}</td>
					<td>${p.r1 || '-'}</td>
					<td>${p.r2 || '-'}</td>
					<td class="${showR3 ? '' : 'hidden-col'}">${p.r3 || '-'}</td>
					<td class="${showR4 ? '' : 'hidden-col'}">${p.r4 || '-'}</td>
					<td class="total-cell">${calculateTotal(p)}</td>
					
					<td style="text-align:center; font-weight:bold; color:var(--emerald);">${p.points || '-'}</td>
					<td style="text-align:center; font-weight:bold;">${p.prize || '$0'}</td>
					
					<td class="bonus-stat">${p.fir || '-'}</td>
					<td class="bonus-stat">${p.gir || '-'}</td>
					<td class="bonus-stat">${p.scrambling || '-'}</td>
					<td class="bonus-stat">${p.ntp || '-'}</td>
				</tr>
			`).join('');
		}

    function renderSeason(points, earnings, events, players) {
        const tbody = document.getElementById('season-body');
        const standings = Object.keys(points).map(name => {
            const pInfo = players.find(p => p.name === name) || { console: 'fa-user', country: 'un' };
            return { name, pts: points[name], cash: earnings[name], evs: events[name], console: pInfo.console, country: pInfo.country };
        }).sort((a, b) => b.pts - a.pts);

        tbody.innerHTML = standings.map((player, index) => {
            let medal = index === 0 ? " 🥇" : index === 1 ? " 🥈" : index === 2 ? " 🥉" : "";
            return `
                <tr>
                    <td>${index + 1}</td>
                    <td>
                        <div class="player-cell">
                            <i class="fa-brands ${player.console}"></i>
                            <span class="fi fi-${player.country}"></span>
                            <strong>${player.name}${medal}</strong>
                        </div>
                    </td>
                    <td>${player.evs || 0}</td>
                    <td>${(player.pts || 0).toLocaleString()}</td>
                    <td>$${(player.cash || 0).toLocaleString()}</td>
                </tr>
            `;
        }).join('');
    }

    function calculateTotal(p) {
        let t = (parseInt(p.r1)||0) + (parseInt(p.r2)||0) + (parseInt(p.r3)||0) + (parseInt(p.r4)||0);
        return t === 0 ? '-' : t;
    }

    function formatToPar(p, coursePar) {
        let total = calculateTotal(p);
        if(total === '-') return '-';
        let rounds = [p.r1, p.r2, p.r3, p.r4].filter(r => r !== "").length;
        let diff = total - (coursePar * rounds);
        if (diff < 0) return `<span class="under-par">${diff}</span>`;
        if (diff === 0) return `<span class="even-par">E</span>`;
        return `<span class="over-par">+${diff}</span>`;
    }
</script>
</body>
</html>
