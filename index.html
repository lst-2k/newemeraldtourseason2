<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #1b5e20; --gold: #fbc02d; --dark: #333; --light-bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--light-bg); scroll-behavior: smooth; }
        
        /* --- HEADER --- */
        .header-wrap { width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container { background-color: var(--emerald); text-align: center; padding: 10px 0; border-bottom: 4px solid var(--gold); }
        .logo-container img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        .venue-section { text-align: center; padding: 15px; background: white; }
        .venue-section h2 { color: var(--emerald); margin: 0; text-transform: uppercase; font-size: 24px; }
        .venue-section p { font-weight: bold; margin: 5px 0 0 0; color: var(--dark); }
        .info-bar-below { background-color: var(--dark); color: #ffeb3b; padding: 8px; display: flex; justify-content: center; gap: 30px; font-size: 13px; font-weight: bold; }

        /* --- LAYOUT --- */
        .content-padding { padding: 10px; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align:center; color: var(--emerald); text-transform: uppercase; margin: 25px 0 10px; font-size: 1.2em; }

        /* --- MAIN TABLES --- */
        .table-container { width: 100%; overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { background-color: var(--emerald); color: white; padding: 12px 8px; text-transform: uppercase; font-size: 11px; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .player-cell { text-align: left !important; font-weight: bold; white-space: nowrap; }
        .platform-icon { width: 14px; vertical-align: middle; margin-right: 6px; }
        .net-cell { background-color: #f1f8e9; font-weight: bold; color: var(--emerald); }

        /* --- GREEN SCROLLABLE HISTORY ACCORDION --- */
        .history-item { background: white; border: 1px solid var(--emerald); margin-bottom: 10px; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .history-header { 
            display: flex; align-items: center; padding: 14px 15px; cursor: pointer; gap: 15px; 
            background-color: var(--emerald); color: white; 
            overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .history-header::-webkit-scrollbar { height: 3px; }
        .history-header::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .history-header > div { flex-shrink: 0; font-size: 14px; }
        .hist-wk { width: 45px; font-weight: bold; color: var(--gold); }
        .hist-venue { flex-grow: 1; text-align: left; font-weight: 600; min-width: 200px; color: white; }
        .hist-date { width: 120px; text-align: right; color: #e0e0e0; font-size: 11px !important; }
        .hist-arrow { width: 30px; text-align: center; color: var(--gold); transition: transform 0.3s; }

        .history-content { display: none; border-top: 1px solid var(--gold); background: #fff; overflow-x: auto; }
        .history-item.active .history-content { display: block; }
        .history-item.active .hist-arrow { transform: rotate(180deg); }

        .hist-table { width: 100%; min-width: 850px; font-size: 12px; }
        .hist-table th { background: #f8f8f8; color: #555; padding: 8px; font-size: 10px; border-bottom: 1px solid #ddd; }
        .hist-table td { padding: 8px; border-bottom: 1px solid #ececec; color: var(--dark); }

        #backToTop { position: fixed; bottom: 20px; right: 20px; display: none; width: 45px; height: 45px; background: var(--emerald); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 18px; z-index: 100; }
    </style>
</head>
<body>

    <button id="backToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

    <div class="header-wrap">
        <div class="logo-container"><img src="logo.png" alt="Emerald Tour Logo"></div>
        <div class="venue-section">
            <h2 id="current-venue">Loading Tournament...</h2>
            <p id="total-prize-pool">--</p>
        </div>
        <div class="info-bar-below">
            <div>DATE: <span id="event-date" style="color:white">--</span></div>
            <div>PAR: <span id="course-par" style="color:white">--</span></div>
        </div>
    </div>

    <div class="content-padding">
        <h3 class="section-title">Live Tournament Leaderboard</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th><th style="text-align:left">PLAYER</th><th>HCP</th>
                        <th>R1</th><th>R2</th><th>R3</th><th>R4</th>
                        <th>GROSS</th><th>NET</th><th>TP</th>
                        <th>FiR</th><th>GiR</th><th>SCR</th><th>NTP</th>
                        <th>PTS</th><th>PRIZE</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div style="text-align: center; margin: 30px 0;">
            <img src="sponsor.png" alt="Sponsor" style="max-width: 100%; height: auto; border-radius: 8px;">
        </div>

        <h3 class="section-title">Season Standings</h3>
        <div class="table-container">
            <table style="min-width: 600px;">
                <thead>
                    <tr>
                        <th style="width:50px">RK</th><th style="text-align:left">PLAYER</th>
                        <th>EV</th><th>PTS</th><th style="text-align:right; padding-right:15px;">EARNINGS</th>
                    </tr>
                </thead>
                <tbody id="season-body"></tbody>
            </table>
        </div>
		
		<div class="footer">
			<img src="2k25-logo.png" alt="PGA TOUR 2K25">
		</div>

        <h3 class="section-title">Season 2 Event History</h3>
        <div id="history-accordion-container"></div>
    </div>

    <script>
        const platformIcons = {
            'fa-playstation': 'https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg',
            'fa-xbox': 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg',
            'fa-steam': 'https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg'
        };

        window.onscroll = () => {
            document.getElementById("backToTop").style.display = (window.scrollY > 400) ? "block" : "none";
        };

        async function loadData() {
            const localPlayers = localStorage.getItem('emeraldAdminData');
            if (localPlayers) {
                render({
                    venue: JSON.parse(localStorage.getItem('emerald_course_settings') || '{}').venue,
                    coursePar: JSON.parse(localStorage.getItem('emerald_course_settings') || '{}').par,
                    prizePool: JSON.parse(localStorage.getItem('emerald_course_settings') || '{}').pool,
                    date: JSON.parse(localStorage.getItem('emerald_course_settings') || '{}').range,
                    players: JSON.parse(localPlayers),
                    eventHistory: JSON.parse(localStorage.getItem('golfEventHistory') || '[]'),
                    seasonPoints: JSON.parse(localStorage.getItem('golfSeasonPoints') || '{}'),
                    seasonEarnings: JSON.parse(localStorage.getItem('golfSeasonEarnings') || '{}'),
                    seasonEvents: JSON.parse(localStorage.getItem('golfSeasonEvents') || '{}')
                });
            } else {
                try {
                    const res = await fetch('data.json?t=' + Date.now());
                    render(await res.json());
                } catch (e) { console.log("Awaiting Data..."); }
            }
        }

        function render(data) {
            const par = parseInt(data.coursePar) || 72;
            const ptsTable = [500, 300, 190, 135, 110, 100, 95, 90, 85, 80, 75, 70, 65, 60, 57, 54, 51, 48, 45, 42];
            
            document.getElementById('current-venue').innerText = data.venue || "ACTIVE TOURNAMENT";
            document.getElementById('course-par').innerText = par;
            document.getElementById('event-date').innerText = data.date || "--";
            document.getElementById('total-prize-pool').innerText = `Total Prize Pool: ${data.prizePool || '--'}`;

            // 1. Leaderboard Logic
            let players = data.players.map(p => {
                const rounds = [p.r1, p.r2, p.r3, p.r4].map(r => parseInt(r) || 0);
                const act = rounds.filter(r => r > 0).length;
                const gross = rounds.reduce((a,b) => a+b, 0);
                const net = act > 0 ? (gross - (parseInt(p.hcap)||0)) : 0;
                const tp = act > 0 ? (net - (par * act)) : 999;
                return { ...p, gross, net, tp, act, displayPos: '-', calcPoints: 0 };
            }).sort((a,b) => a.tp - b.tp);

            let i = 0, rank = 1;
            while (i < players.length) {
                if (players[i].act === 0) { i++; continue; }
                let ties = 0;
                while (i + ties < players.length && players[i + ties].tp === players[i].tp) ties++;
                let sumPts = 0;
                for (let p = rank; p < rank + ties; p++) if (p <= 20) sumPts += ptsTable[p - 1];
                const avgPts = Math.round(sumPts / ties);
                for (let j = 0; j < ties; j++) {
                    players[i+j].displayPos = ties > 1 ? `T${rank}` : rank;
                    players[i+j].calcPoints = avgPts;
                }
                i += ties; rank += ties;
            }

            document.getElementById('leaderboard-body').innerHTML = players.map(p => `
                <tr>
                    <td style="font-weight:bold">${p.displayPos}</td>
                    <td class="player-cell"><img src="${platformIcons[p.console]||''}" class="platform-icon">${p.name}</td>
                    <td style="background:#fffde7; font-style:italic;">${p.hcap||0}</td>
                    <td>${p.r1||'-'}</td><td>${p.r2||'-'}</td><td>${p.r3||'-'}</td><td>${p.r4||'-'}</td>
                    <td>${p.act > 0 ? p.gross : '-'}</td>
                    <td class="net-cell">${p.act > 0 ? p.net : '-'}</td>
                    <td style="font-weight:bold">${p.act > 0 ? (p.tp === 0 ? 'E' : (p.tp > 0 ? '+'+p.tp : p.tp)) : '-'}</td>
                    <td>${p.fir||'-'}</td><td>${p.gir||'-'}</td><td>${p.scram||'-'}</td><td>${p.ntp||'-'}</td>
                    <td style="font-weight:bold; color:var(--emerald)">${p.calcPoints || '-'}</td>
                    <td style="font-weight:bold; color:var(--emerald)">${p.prize||'$0'}</td>
                </tr>`).join('');

            // 2. Season Standings Logic
            if (data.seasonPoints) {
                const names = Object.keys(data.seasonPoints);
                const before = [...names].sort((a,b) => data.seasonPoints[b] - data.seasonPoints[a]);
                const projected = names.map(n => {
                    const pLive = players.find(lp => lp.name === n);
                    return { n, pts: (data.seasonPoints[n] || 0) + (pLive ? pLive.calcPoints : 0), ev: data.seasonEvents[n]||0, earn: data.seasonEarnings[n]||0 };
                }).sort((a,b) => b.pts - a.pts);

                document.getElementById('season-body').innerHTML = projected.map((p, idx) => {
                    const oldIdx = before.indexOf(p.n), move = idx < oldIdx ? '▲' : (idx > oldIdx ? '▼' : '•');
                    const moveCol = idx < oldIdx ? '#2e7d32' : (idx > oldIdx ? '#c62828' : '#999');
                    const pInfo = data.players.find(pl => pl.name === p.n);
                    return `<tr>
                        <td style="padding-left:15px; text-align:left;">${idx+1}</td>
                        <td style="text-align:left; font-weight:bold;">
                            <img src="${platformIcons[pInfo?.console]||''}" class="platform-icon">${p.n} 
                            <span style="color:${moveCol}; font-size:10px; margin-left:5px;">${move}</span>
                        </td>
                        <td>${p.ev}</td>
                        <td style="color:var(--emerald); font-weight:bold">${p.pts.toLocaleString()}</td>
                        <td style="text-align:right; padding-right:15px;"><b>$${p.earn.toLocaleString()}</b></td>
                    </tr>`;
                }).join('');
            }

            // 3. History Accordion Logic (Week - Venue - Date)
            if (data.eventHistory) {
                document.getElementById('history-accordion-container').innerHTML = data.eventHistory.map(h => {
                    const detailsRows = (h.details || []).map(r => `
                        <tr>
                            <td style="width:40px; font-weight:bold; text-align:center;">${r.pos}</td>
                            <td style="text-align:left;">${r.name}</td>
                            <td style="text-align:center;">${r.gross}</td>
                            <td style="text-align:center;">${r.net}</td>
                            <td style="text-align:center; font-weight:bold;">${r.tp}</td>
                            <td style="text-align:center; color:var(--emerald);">${r.pts}</td>
                            <td style="text-align:right; color:var(--emerald); padding-right:10px;">${r.prize}</td>
                        </tr>
                    `).join('');

                    return `
                    <div class="history-item">
                        <div class="history-header" onclick="this.parentElement.classList.toggle('active')">
                            <div class="hist-wk">${h.event}</div>
                            <div class="hist-venue">${h.venue}</div>
                            <div class="hist-date">${h.date || '--'}</div>
                            <div class="hist-arrow">▼</div>
                        </div>
                        <div class="history-content">
                            <table class="hist-table">
                                <thead>
                                    <tr>
                                        <th>POS</th><th style="text-align:left">PLAYER</th><th>G</th><th>N</th><th>TP</th><th>PTS</th><th style="text-align:right; padding-right:10px;">PRIZE</th>
                                    </tr>
                                </thead>
                                <tbody>${detailsRows}</tbody>
                            </table>
                        </div>
                    </div>`;
                }).reverse().join('');
            }
        }
        loadData();
    </script>
</body>
</html>
