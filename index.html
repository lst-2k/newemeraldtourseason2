<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour Leaderboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #228B22; --dark: #1a1a1a; }
        
        /* 1. LAYOUT RESET */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: #f4f4f4; 
            color: var(--dark); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* 2. FULL-WIDTH HERO HEADER (GRID LAYOUT) */
        .event-info-bar { 
            display: grid;
            grid-template-columns: 1fr 2fr 1fr; /* Image-Text-Image */
            align-items: stretch; /* Stretch images to full height */
            position: relative;
            min-height: 120px;
            background: #eee; /* Fallback */
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden; /* Keep images contained */
        }

        .major-event .major-tag { background: #ffd700; color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: 900; margin-left: 10px; }

        /* HERO IMAGE PLACEMENT */
        .logo-container { overflow: hidden; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; } /* Cover fills container */
        
        .event-img-container { overflow: hidden; }
        .event-img-container img { width: 100%; height: 100%; object-fit: cover; } /* Cover fills container */

        /* CENTER TEXT BOX */
        .header-text {
            background: rgba(34, 139, 34, 0.95); /* Semi-transparent Green */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            z-index: 5;
            transition: all 0.5s ease;
        }

        /* Update background for Majors */
        .major-event .header-text { background: linear-gradient(135deg, rgba(75,0,130,0.95), rgba(46,0,79,0.95)) !important; }

        /* 3. SIDE-BY-SIDE SCROLLING (HORIZONTAL) */
        .main-content { 
            display: flex; 
            flex-direction: row; /* Horizontal split */
            gap: 20px; 
            padding: 20px; 
            flex: 1; 
            overflow: hidden; 
        }

        .scroll-card { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }

        /* Leaderboard wider than Standings */
        #leaderboard-card { flex: 2; } 
        #standings-card { flex: 1; }

        .scroll-body { 
            overflow-y: auto; /* Independent vertical scroll */
            flex: 1;
            padding: 0 20px 20px 20px; 
        }
        
        h2 { position: sticky; top: 0; background: white; margin: 0; padding: 15px 20px; z-index: 10; border-bottom: 1px solid #eee; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 10px; text-align: left; font-size: 0.75em; position: sticky; top: 0; z-index: 5; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1); }
        td { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; }

        .total-cell { background:#f9f9f9; font-weight:bold; text-align:center; }
        .playoff-zone { background-color: rgba(34, 139, 34, 0.08) !important; border-left: 5px solid var(--emerald); }
        
        /* 4. FORCE SINGLE LINE (Q) TAG */
        .standings-player {
            display: flex;
            align-items: center;
            white-space: nowrap; /* Prevents text from ever wrapping */
            overflow: hidden;
            text-overflow: ellipsis; /* Adds ... if name is incredibly long */
            min-width: 200px; /* Crucial: Ensures enough space for name+(Q) */
        }
        .q-marker { color: var(--emerald); font-weight: bold; margin-left: 8px; flex-shrink: 0; } /* Won't shrink */

        .player-cell { display: flex; align-items: center; gap: 8px; }
        .fa-playstation { color: #003791; } .fa-xbox { color: #107C10; } .fa-steam { color: #171a21; }
        
        /* Mobile fallback */
        @media (max-width: 1000px) {
            .main-content { flex-direction: column; overflow-y: auto; }
            body { overflow: auto; }
            .event-info-bar { grid-template-columns: 1fr; grid-template-rows: 100px auto; height: auto; }
            .logo-container, .event-img-container { display: none; }
        }
    </style>
</head>
<body>

<div class="event-info-bar">
    <div class="logo-container"><img src="logo.png" alt="Tour Logo"></div>
    <div class="header-text">
        <h1 id="display-week" style="margin:0; font-size: 1.6em;">SEASON 1 | WEEK 1</h1>
        <div id="display-date" style="opacity: 0.9; font-size: 1em;">Loading details...</div>
        <div style="margin-top:5px; font-size: 0.8em; font-weight: bold;">COURSE PAR: <span id="course-par">72</span></div>
    </div>
    <div class="event-img-container"><img src="event.png" alt="Event Image"></div>
</div>

<div class="main-content">
    <div class="scroll-card" id="leaderboard-card">
        <h2>Tournament Leaderboard</h2>
        <div class="scroll-body">
            <table>
                <thead>
                    <tr>
                        <th>Pos</th>
                        <th>Player</th>
                        <th>To Par</th>
                        <th>R1</th>
                        <th>R2</th>
                        <th class="col-r3">R3</th>
                        <th class="col-r4">R4</th>
                        <th style="text-align:center">Total</th>
                        <th style="text-align:center">Pts</th>
                        <th style="text-align:center">Prize</th>
                        <th>FiR</th>
                        <th>GiR</th>
                        <th>Scram</th> <th>NTP</th>   </tr>
                </thead>
                <tbody id="tournament-body"></tbody>
            </table>
        </div>
    </div>

    <div class="scroll-card" id="standings-card">
        <h2>Standings <small style="font-size:0.5em; color:var(--emerald);">(Top 50%=Q)</small></h2>
        <div class="scroll-body">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Player</th>
                        <th>Ev</th>
                        <th>Pts</th>
                        <th>Earn</th>
                    </tr>
                </thead>
                <tbody id="season-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const calculateTotal = (p) => {
        const scores = [p.r1, p.r2, p.r3, p.r4].map(s => parseInt(s) || 0);
        const t = scores.reduce((a, b) => a + b, 0);
        return t === 0 ? '-' : t;
    };

    const formatToPar = (p, par) => {
        const total = calculateTotal(p);
        if (total === '-') return '-';
        const rd = [p.r1, p.r2, p.r3, p.r4].filter(s => s && s !== "").length;
        const diff = total - (par * rd);
        return diff === 0 ? 'E' : (diff > 0 ? `+${diff}` : diff);
    };

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            const infoBar = document.querySelector('.event-info-bar');
            const titleEl = document.getElementById('display-week');
            
            if (data.isSignature) {
                infoBar.classList.add('major-event');
                titleEl.innerHTML = `${data.venue} <span class="major-tag">MAJOR</span>`;
            } else {
                infoBar.classList.remove('major-event');
                titleEl.textContent = data.venue;
            }

            document.getElementById('display-date').textContent = data.date;
            document.getElementById('course-par').textContent = data.coursePar;

            const hasR3 = data.players.some(p => p.r3);
            const hasR4 = data.players.some(p => p.r4);
            document.querySelectorAll('.col-r3').forEach(el => el.style.display = hasR3 ? 'table-cell' : 'none');
            document.querySelectorAll('.col-r4').forEach(el => el.style.display = hasR4 ? 'table-cell' : 'none');

            renderTournament(data.players, parseInt(data.coursePar), hasR3, hasR4);
            renderSeason(data.seasonPoints, data.seasonEarnings, data.seasonEvents);
        });

    function renderTournament(players, par, r3, r4) {
        const tbody = document.getElementById('tournament-body');
        const sorted = [...players].sort((a,b) => (calculateTotal(a) === '-' ? 999 : calculateTotal(a)) - (calculateTotal(b) === '-' ? 999 : calculateTotal(b)));

        tbody.innerHTML = sorted.map((p, i) => {
            const tot = calculateTotal(p);
            const tp = formatToPar(p, par);
            const fStat = (v, u) => (v && v !== '-') ? `${v}${u}` : '-';

            return `
                <tr>
                    <td>${i+1}</td>
                    <td>
                        <div class="player-cell">
                            <i class="fa-brands ${p.console}"></i>
                            <span class="fi fi-${p.country}"></span>
                            <strong>${p.name}</strong>
                        </div>
                    </td>
                    <td style="font-weight:bold; color:${tp.toString().includes('-')?'red':'inherit'}">${tp}</td>
                    <td>${p.r1 || '-'}</td>
                    <td>${p.r2 || '-'}</td>
                    <td style="display:${r3?'table-cell':'none'}">${p.r3 || '-'}</td>
                    <td style="display:${r4?'table-cell':'none'}">${p.r4 || '-'}</td>
                    <td class="total-cell">${tot}</td>
                    <td style="color:var(--emerald); font-weight:bold; text-align:center;">${p.points || '-'}</td>
                    <td style="text-align:center;">${p.prize || '$0'}</td>
                    <td style="font-size:0.85em; color:#666;">${fStat(p.fir, '%')}</td>
                    <td style="font-size:0.85em; color:#666;">${fStat(p.gir, '%')}</td>
                    <td style="font-size:0.85em; color:#666;">${fStat(p.scrambling, '%')}</td>
                    <td style="font-size:0.85em; color:#666;">${fStat(p.ntp, 'ft')}</td>
                </tr>
            `;
        }).join('');
    }

    function renderSeason(pts, earn, evs) {
        const tbody = document.getElementById('season-body');
        const names = Object.keys(pts).sort((a,b) => pts[b] - pts[a]);
        const cutoff = Math.ceil(names.length / 2);

        tbody.innerHTML = names.map((n, i) => {
            const isQ = (i < cutoff && names.length > 1);
            return `
                <tr class="${isQ ? 'playoff-zone' : ''}">
                    <td>${i+1}</td>
                    <td class="standings-player"><strong>${n}</strong> ${isQ ? '<span class="q-marker">(Q)</span>' : ''}</td>
                    <td>${evs[n] || 0}</td>
                    <td style="color:var(--emerald); font-weight:bold;">${pts[n].toLocaleString()}</td>
                    <td>$${earn[n].toLocaleString()}</td>
                </tr>
            `;
        }).join('');
    }
</script>
</body>
</html>
