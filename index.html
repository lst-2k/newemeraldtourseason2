<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Official Standings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --emerald: #228B22; 
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f0; margin: 20px; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h2, h3 { border-bottom: 2px solid var(--emerald); padding-bottom: 10px; color: #222; }

        /* Scroll & Sticky Container */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; } /* Ensures scroll on small screens */
        
        thead th { 
            position: sticky; 
            top: 0; 
            background: #333; 
            color: white; 
            padding: 12px; 
            text-align: left; 
            font-size: 0.8em; 
            z-index: 10;
        }

        td { padding: 10px; border-bottom: 1px solid #eee; background: white; }

        /* One Line Player Info */
        .player-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        /* Colors & Bonus Stats */
        .under-par { color: #d9534f; font-weight: bold; }
        .even-par { color: #228B22; font-weight: bold; }
        .bonus-stat { font-size: 0.85em; color: #555; background: #fafafa; text-align: center; border-left: 1px solid #eee; }
        .total-cell { font-weight: bold; text-align: center; background: #f0fcf0; }
        .hidden-col { display: none; }

        /* Podium */
        #season-body tr:nth-child(1) td { background: #fffdf2; border-left: 6px solid var(--gold); }
        #season-body tr:nth-child(2) td { background: #f9f9f9; border-left: 6px solid var(--silver); }
        #season-body tr:nth-child(3) td { background: #fffaf7; border-left: 6px solid var(--bronze); }
        
        .fa-playstation { color: #003791; }
        .fa-xbox { color: #107C10; }
        .fa-steam { color: #171a21; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="display-title">EMERALD TOUR</h2>
    <p><strong id="display-venue">---</strong> | <span id="display-date">---</span></p>

    <h3>Tournament Leaderboard</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Player</th>
                    <th>To Par</th>
                    <th>R1</th>
                    <th>R2</th>
                    <th class="col-r3">R3</th>
                    <th class="col-r4">R4</th>
                    <th style="text-align:center">Total</th>
                    <th style="text-align:center">FiR</th>
                    <th style="text-align:center">GiR</th>
                    <th style="text-align:center">Scram</th>
                    <th style="text-align:center">NTP</th>
                </tr>
            </thead>
            <tbody id="tournament-body"></tbody>
        </table>
    </div>

    <h3>Season Standings</h3>
    <div class="table-container">
        <table id="season-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Events</th>
                    <th>Points</th>
                    <th>Earnings</th>
                </tr>
            </thead>
            <tbody id="season-body"></tbody>
        </table>
    </div>
</div>

<script>
    fetch('data.json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('display-title').textContent = data.header;
            document.getElementById('display-venue').textContent = data.venue;
            document.getElementById('display-date').textContent = data.date;
            
            const coursePar = parseInt(data.coursePar) || 72;
            
            // Determine if R3/R4 should be visible
            const hasR3 = data.players.some(p => p.r3 && p.r3 !== "");
            const hasR4 = data.players.some(p => p.r4 && p.r4 !== "");
            
            if(!hasR3) document.querySelectorAll('.col-r3').forEach(el => el.classList.add('hidden-col'));
            if(!hasR4) document.querySelectorAll('.col-r4').forEach(el => el.classList.add('hidden-col'));

            renderTournament(data.players, coursePar, hasR3, hasR4);
            renderSeason(data.seasonPoints, data.seasonEarnings, data.seasonEvents, data.players);
        });

    function renderTournament(players, coursePar, showR3, showR4) {
        const tbody = document.getElementById('tournament-body');
        const sorted = [...players].sort((a,b) => (parseInt(calculateTotal(a)) || 999) - (parseInt(calculateTotal(b)) || 999));
        
        tbody.innerHTML = sorted.map((p, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>
                    <div class="player-cell">
                        <i class="fa-brands ${p.console}"></i>
                        <span class="fi fi-${p.country}"></span>
                        <strong>${p.name}</strong>
                    </div>
                </td>
                <td>${formatToPar(p, coursePar)}</td>
                <td>${p.r1 || '-'}</td>
                <td>${p.r2 || '-'}</td>
                <td class="${showR3 ? '' : 'hidden-col'}">${p.r3 || '-'}</td>
                <td class="${showR4 ? '' : 'hidden-col'}">${p.r4 || '-'}</td>
                <td class="total-cell">${calculateTotal(p)}</td>
                <td class="bonus-stat">${p.fir || '-'}</td>
                <td class="bonus-stat">${p.gir || '-'}</td>
                <td class="bonus-stat">${p.scrambling || '-'}</td>
                <td class="bonus-stat">${p.ntp || '-'}</td>
            </tr>
        `).join('');
    }

    function renderSeason(points, earnings, events, players) {
        const tbody = document.getElementById('season-body');
        const standings = Object.keys(points).map(name => {
            const pInfo = players.find(p => p.name === name) || { console: 'fa-user', country: 'un' };
            return { name, pts: points[name], cash: earnings[name], evs: events[name], console: pInfo.console, country: pInfo.country };
        }).sort((a, b) => b.pts - a.pts);

        tbody.innerHTML = standings.map((player, index) => `
            <tr>
                <td>${index + 1}</td>
                <td>
                    <div class="player-cell">
                        <i class="fa-brands ${player.console}"></i>
                        <span class="fi fi-${player.country}"></span>
                        <strong>${player.name} ${index < 3 ? ['🥇','🥈','🥉'][index] : ''}</strong>
                    </div>
                </td>
                <td>${player.evs || 0}</td>
                <td>${(player.pts || 0).toLocaleString()}</td>
                <td>$${(player.cash || 0).toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function calculateTotal(p) {
        let t = (parseInt(p.r1)||0) + (parseInt(p.r2)||0) + (parseInt(p.r3)||0) + (parseInt(p.r4)||0);
        return t === 0 ? '-' : t;
    }

    function formatToPar(p, coursePar) {
        let total = calculateTotal(p);
        if(total === '-') return '-';
        let rounds = [p.r1, p.r2, p.r3, p.r4].filter(r => r !== "").length;
        let diff = total - (coursePar * rounds);
        if (diff < 0) return `<span class="under-par">${diff}</span>`;
        if (diff === 0) return `<span class="even-par">E</span>`;
        return `+${diff}`;
    }
</script>
</body>
</html>
